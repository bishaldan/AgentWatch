{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in | {{ product_name }}</title>
    <link rel="stylesheet" href="{% static 'tracker/dashboard.css' %}">
  </head>
  <body class="login-body">
    <main class="login-card">
      <p class="eyebrow">Operator Access</p>
      <h1>{{ product_name }}</h1>
      <p class="muted">Sign in to investigate likely AI-agent traffic and content access.</p>
      <form method="post" class="stack">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign in</button>
      </form>
    </main>
  </body>
</html>
