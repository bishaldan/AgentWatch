{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in | {{ product_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'tracker/dashboard.css' %}">
  </head>
  <body class="login-page">
    <div class="container py-5">
      <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-12 col-md-8 col-lg-5">
          <div class="card login-card shadow-lg border-0">
            <div class="card-body p-4 p-md-5">
              <p class="text-uppercase small fw-semibold tracking text-accent mb-2">Operator Access</p>
              <h1 class="h2 mb-3">{{ product_name }}</h1>
              <p class="text-muted mb-4">Sign in to review suspicious sessions, AI crawler activity, and content-access investigations.</p>
              <form method="post" class="vstack gap-3">
                {% csrf_token %}
                <div>
                  <label class="form-label" for="id_username">Email or username</label>
                  <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" class="form-control form-control-lg" required id="id_username">
                </div>
                <div>
                  <label class="form-label" for="id_password">Password</label>
                  <input type="password" name="password" autocomplete="current-password" class="form-control form-control-lg" required id="id_password">
                </div>
                {% if form.errors %}
                  <div class="alert alert-danger py-2 mb-0">The email or password is incorrect.</div>
                {% endif %}
                <button type="submit" class="btn btn-success btn-lg w-100">Sign in</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
